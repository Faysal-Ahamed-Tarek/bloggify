{% extends 'base.html' %}
{% load static %}

{% block title %}
  Home - Bloggify
{% endblock %}


{% block custom_css %}
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
{% endblock %}


{% block content %}
  <main class="container">
    <div class="row mt-5 border bg-white rounded p-4 gx-5">

      <!-- Dashboard Menu -->
      {% include 'dashboard/sidebar.html' %}

      <!-- Dashboard Content -->
      <div class="col-12 col-md-10">
        <h4 class="mb-4 text-center">categories</h4>
        <div class="row">
          {% for category in categories %}
            <div class="col-12 col-md-4 mb-4">
              <div class="card">
                <div class="card-body">
                  <h5 class="card-title">{{ category.name }}</h5>
                </div>
              </div>
            </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </main>
{% endblock %}

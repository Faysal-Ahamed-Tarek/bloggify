<div class="col-12 col-md-2 p-0">
  <div class="list-group dashboard-menu">
    <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"><i class="fa-regular fa-chart-bar pe-2"></i> Dashboard</a>
    {% if request.user.is_superuser %}
      <a href="{% url 'users' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'users' %}active{% endif %}"><i class="fa-regular fa-user pe-2"></i> Users</a>
    {% endif %}
    <a href="{% url 'blog' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'blog' %}active{% endif %}"><i class="fa-regular fa-file-lines pe-2"></i> Blogs</a>
    <a href="{% url 'categories' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'categories' %}active{% endif %}"><i class="fa-regular fa-object-ungroup pe-2"></i> categories</a>
    <a href="{% url 'logout' %}" class="list-group-item list-group-item-action"><i class="fa-solid fa-arrow-right-from-bracket pe-2"></i> log out</a>
  </div>
</div>
